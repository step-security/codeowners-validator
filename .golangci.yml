version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - gocritic
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - gochecknoinits
    - unparam
    - gosec
    - whitespace
    - bodyclose
    - gocyclo
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - experimental
        - opinionated
      disabled-checks:
        - emptyStringTest
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - (*os.File).Close
        - (io.ReadCloser).Close
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true
    gosec:
      excludes:
        - G104
        - G301
        - G302
        - G304
        - G703
        - G704
    staticcheck:
      checks:
        - "all"
        - "-QF1012"
        - "-ST1000"
        - "-ST1005"
        - "-ST1020"

formatters:
  enable:
    - gofmt
    - goimports
